<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>隨機經文盲抽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07101f;
      --accent1: #a78bfa;
      --accent2: #60a5fa;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background */
    .bg-image {
      position: fixed; inset: 0;
      background: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;
      filter: brightness(0.2) saturate(0.6);
      z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(7,16,31,0.4) 0%, rgba(7,16,31,0.9) 100%);
      z-index: 0;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .blob1 { width: 400px; height: 400px; background: rgba(167,139,250,0.15); top: -100px; left: -100px; }
    .blob2 { width: 350px; height: 350px; background: rgba(96,165,250,0.12); bottom: -80px; right: -80px; }

    .card {
      position: relative; z-index: 1;
      width: 90%; max-width: 480px;
      padding: 48px 40px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      text-align: center;
      transition: transform 0.3s;
    }

    .card-icon {
      width: 60px; height: 60px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }

    .card-title {
      font-size: 1.1rem; font-weight: 600;
      color: var(--muted); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 32px;
    }

    .verse-wrap {
      min-height: 120px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 28px;
      transition: opacity 0.4s, transform 0.4s;
    }
    .verse-wrap.fade { opacity: 0; transform: translateY(8px); }

    #verse {
      font-size: 1.25rem;
      line-height: 2;
      color: var(--text);
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    #ref {
      margin-top: 14px;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--accent1);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.2);
      padding: 4px 16px;
      border-radius: 100px;
      display: inline-block;
    }
    #ref:empty { display: none; }

    .divider {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(167,139,250,0.3);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(167,139,250,0.4); }
    button:hover::before { background: rgba(255,255,255,0.08); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <div class="card-icon">✝️</div>
    <div class="card-title">隨機經文盲抽</div>
    <div class="divider"></div>
    <div class="verse-wrap" id="verseWrap">
      <div id="verse">按下按鈕，抽取今天的經文</div>
      <div id="ref"></div>
    </div>
    <button onclick="getVerse()">✨ 抽取經文</button>
  </div>

  <script>
    const verses = [
      { text: "耶和華是我的牧者，我必不致缺乏。", ref: "詩篇 23:1" },
      { text: "你要專心仰賴耶和華，不可倚靠自己的聰明。", ref: "箴言 3:5" },
      { text: "我靠著那加給我力量的，凡事都能做。", ref: "腓立比書 4:13" },
      { text: "神愛世人，甚至將他的獨生子賜給他們。", ref: "約翰福音 3:16" },
      { text: "主耶和華是我的力量；他使我的腳快如母鹿的蹄。", ref: "哈巴谷書 3:19" },
      { text: "凡勞苦擔重擔的人，可以到我這裡來，我就使你們得安息。", ref: "馬太福音 11:28" },
      { text: "應當一無掛慮，只要凡事藉著禱告祈求和感謝，將你們所要的告訴神。", ref: "腓立比書 4:6" }
    ];

    function getVerse() {
      const wrap = document.getElementById('verseWrap');
      wrap.classList.add('fade');
      setTimeout(() => {
        const r = verses[Math.floor(Math.random() * verses.length)];
        document.getElementById('verse').innerText = r.text;
        document.getElementById('ref').innerText = r.ref;
        wrap.classList.remove('fade');
      }, 350);
    }
  </script>
</body>
</html>
